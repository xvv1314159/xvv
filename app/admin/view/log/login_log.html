{extend name="base"}
{block name="main"}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="mdi mdi-login me-1"></i> 登录日志</h5>
    <button class="btn btn-sm btn-outline-danger" onclick="clearLog()"><i class="mdi mdi-delete"></i> 清空日志</button>
  </div>
  <div class="card-body">
    <form class="row g-2 mb-3" method="get">
      <div class="col-auto">
        <input type="text" class="form-control form-control-sm" name="keyword" value="{$keyword}" placeholder="搜索用户名">
      </div>
      <div class="col-auto">
        <select class="form-select form-select-sm" name="status">
          <option value="">全部状态</option>
          <option value="1" {if $status==='1'}selected{/if}>成功</option>
          <option value="0" {if $status==='0'}selected{/if}>失败</option>
        </select>
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-primary">搜索</button>
      </div>
    </form>
    <div class="table-responsive">
      <table class="table table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>IP</th>
            <th>状态</th>
            <th>备注</th>
            <th>User-Agent</th>
            <th>时间</th>
          </tr>
        </thead>
        <tbody>
          {foreach $logs as $log}
          <tr>
            <td>{$log.id}</td>
            <td>{$log.username}</td>
            <td>{$log.ip}</td>
            <td>
              {if $log.status==1}
              <span class="badge bg-success">成功</span>
              {else}
              <span class="badge bg-danger">失败</span>
              {/if}
            </td>
            <td>{$log.remark}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:#999" title="{$log.ua}">{$log.ua}</td>
            <td>{$log.create_time|date='Y-m-d H:i:s'}</td>
          </tr>
          {/foreach}
        </tbody>
      </table>
    </div>
    <div class="mt-2">{$logs|raw}</div>
  </div>
</div>
{/block}
{block name="script"}
<script>
const _app = createVueApp({});
const _vm = _app.mount('#app');
function clearLog() {
  _vm.confirm('确定要清空所有登录日志吗？此操作不可撤销！', () => {
    _vm.post({:url("log/clear_login_log")}, {}, res => {
      _vm.alert(res, () => { if(res.code==1) location.reload(); });
    });
  });
}
</script>
{/block}
