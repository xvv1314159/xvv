<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面跳转中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .jump-container {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .icon { width: 80px; height: 80px; margin: 0 auto 30px; }
        .icon svg { width: 100%; height: 100%; }
        .checkmark {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: dash 0.6s ease-in-out forwards;
        }
        @keyframes dash { to { stroke-dashoffset: 0; } }
        .circle { animation: circleAnim 0.6s ease-in-out; }
        @keyframes circleAnim {
            0%   { transform: scale(0); opacity: 0; }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 { font-size: 28px; color: #333; margin-bottom: 15px; font-weight: 600; }
        .message { font-size: 16px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .countdown { font-size: 14px; color: #999; margin-bottom: 25px; }
        .countdown span { color: #667eea; font-weight: 600; font-size: 18px; }
        .actions { display: flex; gap: 15px; justify-content: center; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f5f5f5; color: #666; }
        .btn-secondary:hover { background: #e8e8e8; }
        .progress-bar {
            width: 100%; height: 4px; background: #f0f0f0;
            border-radius: 2px; overflow: hidden; margin-top: 30px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            animation: progress var(--wait-time) linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body>
    <div class="jump-container">
        <div class="icon">
            {if $type == 'error'}
            <svg viewBox="0 0 100 100">
                <circle class="circle" cx="50" cy="50" r="45" fill="none" stroke="#ff4d4f" stroke-width="4"/>
                <line class="checkmark" x1="30" y1="30" x2="70" y2="70" stroke="#ff4d4f" stroke-width="4" stroke-linecap="round"/>
                <line class="checkmark" x1="70" y1="30" x2="30" y2="70" stroke="#ff4d4f" stroke-width="4" stroke-linecap="round"/>
            </svg>
            {elseif $type == 'info'}
            <svg viewBox="0 0 100 100">
                <circle class="circle" cx="50" cy="50" r="45" fill="none" stroke="#1890ff" stroke-width="4"/>
                <circle cx="50" cy="35" r="4" fill="#1890ff"/>
                <line x1="50" y1="45" x2="50" y2="75" stroke="#1890ff" stroke-width="4" stroke-linecap="round"/>
            </svg>
            {else}
            <svg viewBox="0 0 100 100">
                <circle class="circle" cx="50" cy="50" r="45" fill="none" stroke="#52c41a" stroke-width="4"/>
                <polyline class="checkmark" points="25,50 45,70 75,35" fill="none" stroke="#52c41a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            {/if}
        </div>
        <h1>{$title|default='操作成功'}</h1>
        <div class="message">{$msg|default='页面即将跳转...'}</div>
        {notempty name="url"}
        <div class="countdown"><span id="countdown">{$wait|default=3}</span> 秒后自动跳转</div>
        <div class="actions">
            <a href="{$url}" class="btn btn-primary">立即跳转</a>
            <a href="javascript:history.back()" class="btn btn-secondary">返回上页</a>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="--wait-time: {$wait|default=3}s;"></div>
        </div>
        {/notempty}
        {empty name="url"}
        <div class="actions">
            <a href="javascript:history.back()" class="btn btn-primary">返回上页</a>
        </div>
        {/empty}
    </div>
    <script>
    {notempty name="url"}
    (function() {
        var wait = {$wait|default=3};
        var url  = '{$url}';
        var el   = document.getElementById('countdown');
        var timer = setInterval(function() {
            wait--;
            if (el) el.textContent = wait;
            if (wait <= 0) { clearInterval(timer); window.location.href = url; }
        }, 1000);
    })();
    {/notempty}
    </script>
</body>
</html>
