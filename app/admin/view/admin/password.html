{extend name="base"}
{block name="main"}
<div class="card">
    <div class="card-header">
        <h4>修改密码</h4>
    </div>
    <div class="card-body">
        <form @submit.prevent="submitPassword">
            <div class="mb-3">
                <label class="form-label">原密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" required placeholder="请输入原密码" v-model="form.old_password">
            </div>
            <div class="mb-3">
                <label class="form-label">新密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" required placeholder="请输入新密码（5-25位）" v-model="form.new_password">
                <small class="form-text text-muted">密码长度为 5-25 位</small>
            </div>
            <div class="mb-3">
                <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" required placeholder="请再次输入新密码" v-model="form.confirm_password">
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
            <button type="reset" class="btn btn-default" @click="resetForm">重置</button>
        </form>
    </div>
</div>
{/block}
{block name="script"}
<script>
    createVueApp({
        data() {
            return {
                form: {
                    old_password: '',
                    new_password: '',
                    confirm_password: ''
                }
            };
        },
        methods: {
            resetForm() {
                this.form = {
                    old_password: '',
                    new_password: '',
                    confirm_password: ''
                };
            },
            submitPassword() {
                if(this.form.new_password.length < 5 || this.form.new_password.length > 25){
                    this.alert({code: 0, msg: '密码长度为 5-25 位'});
                    return false;
                }
                
                if(this.form.new_password !== this.form.confirm_password){
                    this.alert({code: 0, msg: '两次密码输入不一致'});
                    return false;
                }
                
                this.submit();
            }
        }
    }).mount('#app');
</script>
{/block}
