{extend name="base"}
{block name="main"}
<div class="card">
    <div class="card-body">
        <form @submit.prevent="submit">
            <div class="mb-3">
                <label class="form-label">角色</label>
                <select class="form-control form-select" multiple v-model="form.role_ids">
                    {foreach $roles as $v}
                    <option value="{$v.id}">{$v.name}</option>
                    {/foreach}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">昵称</label>
                <input type="text" class="form-control" required v-model="form.nickname">
            </div>
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" required v-model="form.username">
            </div>
            <div class="mb-3">
                <label class="form-label">登录密码</label>
                <input type="password" class="form-control" required placeholder="请输入登录密码" v-model="form.password">
            </div>
            <div class="mb-3">
                <label class="form-label">状态</label>
                <select class="form-control form-select" v-model="form.status">
                    <option value="1">正常</option>
                    <option value="0">禁用</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">提交</button>
        </form>
    </div>
</div>
{/block}
{block name="script"}
<script>
    createVueApp({
        data() {
            return {
                form: {
                    role_ids: [],
                    nickname: '',
                    username: '',
                    password: '',
                    status: '1'
                }
            };
        }
    }).mount('#app');
</script>
{/block}
