{extend name="base"}
{block name="main"}

<div class="row">

  <div class="col-lg-12">
    <div class="card">
      <div class="card-body">
        <div class="card-btns mb-2-5">
          <a class="btn btn-sm btn-primary me-1" href="add"><i class="mdi mdi-plus"></i> 新增</a>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>编号</th>
                <th>用户名</th>
                <th>昵称</th>
                <th>状态</th>
                <th>添加时间</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
                {foreach $admins as $v}
              <tr>
                <td>{$v.id}</td>
                <td>{$v.username}</td>
                <td>{$v.nickname}</td>
                <td>{$v.status?'<font class="text-success">启用</font>':'<font class="text-danger">停用</font>'}</td>
                <td>{$v.create_time}</td>
                <td>{$v.update_time}</td>
                <td>
                  <a href="edit?id={$v.id}">修改</a>
                  <span class="text-muted mx-1">|</span>
                  <a href="javascript:void(0)" class="text-danger" onclick="del({$v.id})">删除</a>
                </td>
              </tr>
                {/foreach}
            </tbody>
          </table>
        </div>
        {$admins|raw}
      </div>
    </div>
  </div>

</div>
{/block}
