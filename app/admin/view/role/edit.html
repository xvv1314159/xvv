{extend name="base"}
{block name="head"}
<link rel="stylesheet" href="/static/jstree/themes/default/style.css">
<style>
.permission-tree { min-height: 120px; max-height: 380px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
.plugin-perm-card { border: 1px solid #e3e6f0; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.plugin-perm-header { background: #f8f9fc; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e3e6f0; }
.plugin-perm-header .plugin-title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
.plugin-perm-body { padding: 10px; }
</style>
{/block}

{block name="main"}
<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">编辑角色 - {$role.name}</h5></div>
            <div class="card-body">
                <form @submit.prevent="submit1">
                    <div class="mb-3">
                        <label class="form-label">角色名称</label>
                        <input type="text" class="form-control" required v-model="form.name">
                    </div>

                    {if $role.rules!='*'}
                    <!-- 系统权限 -->
                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            <span><i class="mdi mdi-shield-account"></i> 后台权限</span>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="checkAllSystem" @change="toggleAllSystem">
                                <label class="form-check-label" for="checkAllSystem">全选</label>
                            </div>
                        </label>
                        <div ref="systemTree" class="permission-tree"></div>
                    </div>

                    <!-- 插件权限 -->
                    <div v-if="pluginRuleKeys.length > 0" class="mb-4">
                        <label class="form-label"><i class="mdi mdi-puzzle"></i> 插件权限</label>
                        <div v-for="key in pluginRuleKeys" :key="key" class="plugin-perm-card">
                            <div class="plugin-perm-header">
                                <span class="plugin-title">
                                    <i :class="pluginRules[key].icon"></i>
                                    {{ pluginRules[key].name }}
                                </span>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" :id="'checkAll_'+key" @change="e => toggleAllPlugin(e, key)">
                                    <label class="form-check-label" :for="'checkAll_'+key">全选</label>
                                </div>
                            </div>
                            <div class="plugin-perm-body">
                                <div :ref="'pluginTree_'+key" class="permission-tree"></div>
                            </div>
                        </div>
                    </div>
                    {/if}

                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-control form-select" v-model="form.status">
                            <option value="1">正常</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{:url("role/index")}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script src="/static/jstree/jstree.js"></script>
<script>
createVueApp({
    data() {
        return {
            form: JSON.parse('{$role|json_encode|raw}'),
            systemRules: JSON.parse('{:json_encode($systemRules)}'),
            pluginRules:  JSON.parse('{:json_encode($pluginRules)}'),
            systemTree: null,
            pluginTrees: {}
        };
    },
    computed: {
        pluginRuleKeys() { return Object.keys(this.pluginRules); }
    },
    mounted() {
        this.initSystemTree();
        this.$nextTick(() => this.initPluginTrees());
    },
    methods: {
        initSystemTree() {
            this.systemTree = $(this.$refs.systemTree).jstree({
                core: { data: this.systemRules, themes: { icons: false } },
                plugins: ['checkbox'],
                checkbox: { three_state: true, cascade: 'up+down' }
            });
        },
        initPluginTrees() {
            this.pluginRuleKeys.forEach(key => {
                const ref = this.$refs['pluginTree_' + key];
                const el = Array.isArray(ref) ? ref[0] : ref;
                if (!el) return;
                const data = this.pluginRules[key].rules.map(r => ({
                    id: String(r.id), parent: r.pid ? String(r.pid) : '#',
                    text: r.title, state: r.state
                }));
                this.pluginTrees[key] = $(el).jstree({
                    core: { data, themes: { icons: false } },
                    plugins: ['checkbox'],
                    checkbox: { three_state: true, cascade: 'up+down' }
                });
            });
        },
        toggleAllSystem(e) {
            e.target.checked ? this.systemTree.jstree('check_all') : this.systemTree.jstree('uncheck_all');
        },
        toggleAllPlugin(e, key) {
            const tree = this.pluginTrees[key];
            if (!tree) return;
            e.target.checked ? tree.jstree('check_all') : tree.jstree('uncheck_all');
        },
        submit1(e) {
            let allRules = [
                ...this.systemTree.jstree('get_checked'),
                ...this.systemTree.jstree('get_undetermined')
            ];
            Object.values(this.pluginTrees).forEach(tree => {
                allRules = allRules.concat(tree.jstree('get_checked'), tree.jstree('get_undetermined'));
            });
            this.form.rules = [...new Set(allRules)];
            this.submit(e);
        }
    }
}).mount('#app');
</script>
{/block}
